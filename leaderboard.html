<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dealership &amp; Dragons - Leaderboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0F172A;
      color: #E2E8F0;
      min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, #1E293B 0%, #0F172A 100%);
      border-bottom: 2px solid #F59E0B;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 {
      font-size: 20px;
      color: #F59E0B;
      font-weight: 800;
      letter-spacing: 1px;
    }
    header p {
      font-size: 12px;
      color: #94A3B8;
      margin-top: 2px;
    }
    .back-link {
      color: #0891B2;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
    }
    .back-link:hover { text-decoration: underline; }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 16px 100px;
    }
    .section {
      background: #1E293B;
      border-radius: 12px;
      margin-bottom: 20px;
      overflow: hidden;
      border: 1px solid #334155;
    }
    .section-header {
      background: #334155;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .section-title {
      font-size: 16px;
      font-weight: 700;
      color: #F8FAFC;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title .icon { font-size: 20px; }
    .section-total {
      font-size: 22px;
      font-weight: 800;
      color: #F59E0B;
      min-width: 60px;
      text-align: right;
    }
    .team-row {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      border-bottom: 1px solid #262f3d;
      gap: 12px;
    }
    .team-row:last-child { border-bottom: none; }
    .team-name {
      flex: 1;
      font-size: 15px;
      font-weight: 600;
      color: #CBD5E1;
    }
    .team-name.editable {
      background: transparent;
      border: 1px dashed #475569;
      border-radius: 6px;
      padding: 4px 8px;
      color: #CBD5E1;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      outline: none;
      min-width: 0;
    }
    .team-name.editable:focus {
      border-color: #0891B2;
      background: #0F172A;
    }
    .points-input {
      width: 80px;
      background: #0F172A;
      border: 1px solid #475569;
      border-radius: 6px;
      padding: 6px 10px;
      color: #E2E8F0;
      font-size: 14px;
      font-family: inherit;
      text-align: center;
      outline: none;
    }
    .points-input:focus { border-color: #F59E0B; }
    .points-input::placeholder { color: #64748B; }
    .add-btn {
      background: #0891B2;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
    }
    .add-btn:hover { background: #0E7490; }
    .add-btn:active { transform: scale(0.97); }
    .team-total {
      font-size: 18px;
      font-weight: 800;
      color: #F59E0B;
      min-width: 50px;
      text-align: right;
    }
    .group-total-bar {
      background: linear-gradient(135deg, #F59E0B 0%, #D97706 100%);
      border-radius: 12px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
    }
    .group-total-label {
      font-size: 20px;
      font-weight: 800;
      color: #0F172A;
      letter-spacing: 1px;
    }
    .group-total-value {
      font-size: 36px;
      font-weight: 900;
      color: #0F172A;
    }
    .reset-bar {
      text-align: center;
      margin-top: 24px;
    }
    .reset-btn {
      background: #991B1B;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 8px 20px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
    .reset-btn:hover { background: #7F1D1D; }
    .flash {
      animation: flashGold 0.4s ease-out;
    }
    @keyframes flashGold {
      0% { color: #FDE68A; transform: scale(1.15); }
      100% { color: #F59E0B; transform: scale(1); }
    }
    .history-log {
      font-size: 11px;
      color: #64748B;
      padding: 2px 16px 8px;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s;
    }
    .history-log.open { max-height: 200px; overflow-y: auto; }
    .history-entry { padding: 2px 0; }
    .history-toggle {
      background: none;
      border: none;
      color: #64748B;
      font-size: 11px;
      cursor: pointer;
      padding: 0 16px 6px;
      font-family: inherit;
    }
    .history-toggle:hover { color: #94A3B8; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>&#9876; DEALERSHIP &amp; DRAGONS</h1>
    <p>Leaderboard - Fred Anderson Toyota of Cape Coral</p>
  </div>
  <a class="back-link" href="index.html">&#8592; Back to Sim</a>
</header>

<div class="container" id="app"></div>

<script>
document.addEventListener('DOMContentLoaded', function() {

  var STORAGE_KEY = 'dd_leaderboard_v1';

  var defaultState = {
    salespeople: [
      { name: 'Salesperson 1', points: 0, log: [] },
      { name: 'Salesperson 2', points: 0, log: [] },
      { name: 'Salesperson 3', points: 0, log: [] },
      { name: 'Salesperson 4', points: 0, log: [] },
      { name: 'Salesperson 5', points: 0, log: [] },
      { name: 'Salesperson 6', points: 0, log: [] },
      { name: 'Salesperson 7', points: 0, log: [] },
      { name: 'Salesperson 8', points: 0, log: [] }
    ],
    managers: { points: 0, log: [] },
    bdc: { points: 0, log: [] },
    serviceToSales: { points: 0, log: [] },
    delivery: { points: 0, log: [] }
  };

  function loadState() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch(e) {}
    return JSON.parse(JSON.stringify(defaultState));
  }

  function saveState() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
  }

  var state = loadState();

  function getSalesTotal() {
    var t = 0;
    for (var i = 0; i < state.salespeople.length; i++) t += state.salespeople[i].points;
    return t;
  }

  function getGroupTotal() {
    return getSalesTotal() + state.managers.points + state.bdc.points + state.serviceToSales.points + state.delivery.points;
  }

  function timestamp() {
    var d = new Date();
    return (d.getMonth()+1) + '/' + d.getDate() + ' ' + d.getHours() + ':' + (d.getMinutes()<10?'0':'') + d.getMinutes();
  }

  function addPoints(target, inputId, totalId) {
    var input = document.getElementById(inputId);
    var val = parseFloat(input.value);
    if (isNaN(val) || val === 0) { input.value = ''; return; }
    target.points += val;
    target.log.push({ val: val, time: timestamp() });
    input.value = '';
    saveState();
    render();
    var el = document.getElementById(totalId);
    if (el) { el.classList.remove('flash'); void el.offsetWidth; el.classList.add('flash'); }
  }

  function renameSalesperson(idx, newName) {
    state.salespeople[idx].name = newName || ('Salesperson ' + (idx+1));
    saveState();
  }

  function resetAll() {
    if (confirm('Reset ALL points to zero? This cannot be undone.')) {
      state = JSON.parse(JSON.stringify(defaultState));
      // preserve custom names? No, full reset.
      saveState();
      render();
    }
  }

  function toggleLog(id) {
    var el = document.getElementById(id);
    if (el) el.classList.toggle('open');
  }

  function buildLogHTML(log, id) {
    if (!log || log.length === 0) return '';
    var html = '<button class="history-toggle" onclick="window.__lb.toggleLog(\'' + id + '\')">' + log.length + ' entries &#9662;</button>';
    html += '<div class="history-log" id="' + id + '">';
    for (var i = log.length - 1; i >= 0; i--) {
      var e = log[i];
      html += '<div class="history-entry">' + e.time + ': ' + (e.val > 0 ? '+' : '') + e.val + '</div>';
    }
    html += '</div>';
    return html;
  }

  function render() {
    var html = '';

    // SALESPEOPLE SECTION
    html += '<div class="section">';
    html += '<div class="section-header"><span class="section-title"><span class="icon">&#9876;</span> Partner Salespeople</span><span class="section-total" id="sales-total">' + getSalesTotal() + '</span></div>';
    for (var i = 0; i < state.salespeople.length; i++) {
      var sp = state.salespeople[i];
      html += '<div class="team-row">';
      html += '<input class="team-name editable" value="' + sp.name.replace(/"/g, '&quot;') + '" data-sp-idx="' + i + '" onchange="window.__lb.renameSP(this)" />';
      html += '<input class="points-input" id="sp-input-' + i + '" type="text" placeholder="+/-" onkeydown="if(event.key===\'Enter\')window.__lb.addSP(' + i + ')" />';
      html += '<button class="add-btn" onclick="window.__lb.addSP(' + i + ')">Add</button>';
      html += '<span class="team-total" id="sp-total-' + i + '">' + sp.points + '</span>';
      html += '</div>';
      html += buildLogHTML(sp.log, 'sp-log-' + i);
    }
    html += '</div>';

    // SALES MANAGERS
    html += '<div class="section">';
    html += '<div class="section-header"><span class="section-title"><span class="icon">&#127942;</span> Sales Managers</span><span class="section-total" id="mgr-total">' + state.managers.points + '</span></div>';
    html += '<div class="team-row">';
    html += '<span class="team-name">Manager Team</span>';
    html += '<input class="points-input" id="mgr-input" type="text" placeholder="+/-" onkeydown="if(event.key===\'Enter\')window.__lb.addMgr()" />';
    html += '<button class="add-btn" onclick="window.__lb.addMgr()">Add</button>';
    html += '</div>';
    html += buildLogHTML(state.managers.log, 'mgr-log');
    html += '</div>';

    // BDC
    html += '<div class="section">';
    html += '<div class="section-header"><span class="section-title"><span class="icon">&#128222;</span> BDC</span><span class="section-total" id="bdc-total">' + state.bdc.points + '</span></div>';
    html += '<div class="team-row">';
    html += '<span class="team-name">BDC Team</span>';
    html += '<input class="points-input" id="bdc-input" type="text" placeholder="+/-" onkeydown="if(event.key===\'Enter\')window.__lb.addBDC()" />';
    html += '<button class="add-btn" onclick="window.__lb.addBDC()">Add</button>';
    html += '</div>';
    html += buildLogHTML(state.bdc.log, 'bdc-log');
    html += '</div>';

    // SERVICE TO SALES
    html += '<div class="section">';
    html += '<div class="section-header"><span class="section-title"><span class="icon">&#128295;</span> Service to Sales</span><span class="section-total" id="sts-total">' + state.serviceToSales.points + '</span></div>';
    html += '<div class="team-row">';
    html += '<span class="team-name">Per Customer</span>';
    html += '<input class="points-input" id="sts-input" type="text" placeholder="+/-" onkeydown="if(event.key===\'Enter\')window.__lb.addSTS()" />';
    html += '<button class="add-btn" onclick="window.__lb.addSTS()">Add</button>';
    html += '</div>';
    html += buildLogHTML(state.serviceToSales.log, 'sts-log');
    html += '</div>';

    // DELIVERY SPECIALIST
    html += '<div class="section">';
    html += '<div class="section-header"><span class="section-title"><span class="icon">&#128666;</span> Delivery Specialist</span><span class="section-total" id="del-total">' + state.delivery.points + '</span></div>';
    html += '<div class="team-row">';
    html += '<span class="team-name">Per Delivery</span>';
    html += '<input class="points-input" id="del-input" type="text" placeholder="+/-" onkeydown="if(event.key===\'Enter\')window.__lb.addDel()" />';
    html += '<button class="add-btn" onclick="window.__lb.addDel()">Add</button>';
    html += '</div>';
    html += buildLogHTML(state.delivery.log, 'del-log');
    html += '</div>';

    // GROUP TOTAL
    html += '<div class="group-total-bar">';
    html += '<span class="group-total-label">&#9876; GROUP TOTAL</span>';
    html += '<span class="group-total-value" id="group-total">' + getGroupTotal() + '</span>';
    html += '</div>';

    // RESET
    html += '<div class="reset-bar"><button class="reset-btn" onclick="window.__lb.resetAll()">Reset All Points</button></div>';

    document.getElementById('app').innerHTML = html;
  }

  window.__lb = {
    addSP: function(i) { addPoints(state.salespeople[i], 'sp-input-' + i, 'sp-total-' + i); },
    addMgr: function() { addPoints(state.managers, 'mgr-input', 'mgr-total'); },
    addBDC: function() { addPoints(state.bdc, 'bdc-input', 'bdc-total'); },
    addSTS: function() { addPoints(state.serviceToSales, 'sts-input', 'sts-total'); },
    addDel: function() { addPoints(state.delivery, 'del-input', 'del-total'); },
    renameSP: function(el) { renameSalesperson(parseInt(el.dataset.spIdx), el.value); },
    resetAll: resetAll,
    toggleLog: toggleLog
  };

  render();
});
</script>
</body>
</html>
