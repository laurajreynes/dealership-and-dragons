<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dealership &amp; Dragons - Leaderboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, 'system-ui', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f1f5f9;
            color: #1e293b;
            min-height: 100vh;
            -webkit-text-size-adjust: 100%;
        }
        header {
            background: #1f2937;
            color: #fff;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        header h1 { font-size: 16px; font-weight: 700; }
        header p { font-size: 11px; color: #94a3b8; margin-top: 2px; }
        .back-link { color: #60a5fa; text-decoration: none; font-size: 13px; font-weight: 500; white-space: nowrap; margin-left: 12px; }
        .back-link:hover { color: #93c5fd; }
        .container { max-width: 600px; margin: 0 auto; padding: 16px 12px; }

        .sync-badge {
            text-align: center;
            margin-bottom: 12px;
        }
        .sync-badge span {
            display: inline-block;
            background: #dcfce7;
            color: #166534;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 20px;
        }
        .sync-badge.offline span {
            background: #fef2f2;
            color: #991b1b;
        }

        /* --- Podium --- */
        .podium-wrap {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 8px;
            margin-bottom: 16px;
        }
        .podium-card {
            flex: 1;
            max-width: 160px;
            text-align: center;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .podium-card:hover { transform: translateY(-2px); }
        .podium-card .top {
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
        }
        .podium-card .top .rank { font-weight: 800; opacity: 0.9; line-height: 1; }
        .podium-card .top .team-name { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }
        .podium-card .big-score { font-weight: 800; color: #1e293b; background: #fff; }
        .podium-card .score-area {
            background: #fff;
            padding: 6px 8px;
            display: flex;
            align-items: center;
            gap: 4px;
            justify-content: center;
        }
        .podium-card .score-area input {
            width: 44px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            padding: 5px 2px;
            font-size: 13px;
            text-align: center;
            font-family: inherit;
        }
        .podium-card .score-area input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px #3b82f633; }
        .podium-card .score-area button {
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 5px 10px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }
        .podium-card .score-area button:hover { background: #1d4ed8; }

        /* Rank colors */
        .rank-1 .top { background: linear-gradient(135deg, #d97706, #f59e0b); }
        .rank-2 .top { background: linear-gradient(135deg, #475569, #64748b); }
        .rank-3 .top { background: linear-gradient(135deg, #9a3412, #ea580c); }

        .rank-1 .top { padding: 24px 8px 14px; }
        .rank-1 .top .rank { font-size: 26px; }
        .rank-1 .big-score { font-size: 30px; padding: 8px 0; }

        .rank-2 .top { padding: 18px 8px 12px; }
        .rank-2 .top .rank { font-size: 22px; }
        .rank-2 .big-score { font-size: 24px; padding: 6px 0; }

        .rank-3 .top { padding: 12px 8px 10px; }
        .rank-3 .top .rank { font-size: 18px; }
        .rank-3 .big-score { font-size: 20px; padding: 5px 0; }

        /* --- Sales Team Section --- */
        .sales-section {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            margin-bottom: 14px;
            overflow: hidden;
        }
        .section-bar {
            background: #1e293b;
            color: #fff;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: 700;
        }
        .section-bar .score { font-size: 22px; font-weight: 800; color: #60a5fa; }

        .sp-row {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            gap: 8px;
            border-bottom: 1px solid #f1f5f9;
        }
        .sp-row:last-child { border-bottom: none; }
        .sp-row:hover { background: #f8fafc; }
        .sp-num {
            font-size: 12px;
            font-weight: 700;
            color: #94a3b8;
            min-width: 20px;
            text-align: center;
        }
        .sp-name {
            flex: 1;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            font-size: 14px;
            font-family: inherit;
            color: #334155;
            padding: 6px 8px;
            border-radius: 6px;
            min-width: 0;
        }
        .sp-name:focus { outline: none; background: #eff6ff; border-color: #3b82f6; box-shadow: 0 0 0 2px #3b82f633; }
        .sp-name::placeholder { color: #cbd5e1; }
        .mini-input {
            width: 50px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            padding: 6px 4px;
            font-size: 13px;
            text-align: center;
            font-family: inherit;
            color: #334155;
        }
        .mini-input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px #3b82f633; }
        .add-btn {
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            white-space: nowrap;
        }
        .add-btn:hover { background: #1d4ed8; }
        .add-btn:active { transform: scale(0.96); }
        .pts {
            font-size: 16px;
            font-weight: 700;
            color: #1e293b;
            min-width: 30px;
            text-align: right;
        }

        /* --- Group Total --- */
        .group-total {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            border-radius: 12px;
            padding: 16px 20px;
            margin-top: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 12px rgba(30,41,59,0.3);
        }
        .group-total .label {
            font-size: 14px;
            font-weight: 800;
            color: #fff;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
        .group-total .value {
            font-size: 32px;
            font-weight: 800;
            color: #60a5fa;
        }

        .reset-wrap { text-align: center; margin-top: 16px; padding-bottom: 24px; }
        .reset-btn {
            background: transparent;
            color: #94a3b8;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            padding: 8px 24px;
            font-size: 13px;
            cursor: pointer;
            font-family: inherit;
        }
        .reset-btn:hover { background: #fef2f2; color: #dc2626; border-color: #fca5a5; }

        @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }
        .pop { animation: pop 0.25s ease; }

        /* --- Mobile tweaks --- */
        @media (max-width: 480px) {
            header { padding: 12px 14px; }
            header h1 { font-size: 14px; }
            .container { padding: 12px 8px; }
            .podium-wrap { gap: 5px; }
            .podium-card .top .team-name { font-size: 9px; }
            .podium-card .score-area input { width: 38px; font-size: 12px; padding: 4px 2px; }
            .podium-card .score-area button { padding: 4px 8px; font-size: 11px; }
            .rank-1 .big-score { font-size: 24px; }
            .rank-2 .big-score { font-size: 20px; }
            .rank-3 .big-score { font-size: 18px; }
            .sp-row { padding: 8px 10px; gap: 6px; }
            .sp-name { font-size: 13px; padding: 5px 6px; }
            .mini-input { width: 44px; font-size: 12px; padding: 5px 2px; }
            .pts { font-size: 15px; min-width: 26px; }
            .group-total { padding: 14px 16px; }
            .group-total .value { font-size: 28px; }
        }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>Fred Anderson Toyota of Cape Coral</h1>
            <p>Dealership &amp; Dragons - Leaderboard</p>
        </div>
        <a href="index.html" class="back-link">&#8592; Back to Sim</a>
    </header>

    <div class="container">
        <div class="sync-badge" id="syncBadge"><span>Connecting...</span></div>
        <div id="app"></div>
    </div>

    <!-- Firebase SDK (same as main app) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
    // Firebase init - same project as main simulation
    firebase.initializeApp({
        apiKey: "AIzaSyDummyKeyNotNeededForRTDB",
        databaseURL: "https://discovery-game-default-rtdb.firebaseio.com",
        projectId: "discovery-game"
    });

    var db = firebase.database();
    var ref = db.ref('dd/leaderboard');
    var connected = false;

    function defaultState() {
        return {
            salespeople: Array.from({length:9}, function(_,i) { return {name:'', points:0}; }),
            managers: {points:0},
            bdc: {points:0},
            delivery: {points:0}
        };
    }

    var state = defaultState();
    var debounceTimer = null;

    // --- Firebase sync ---
    function saveToFirebase() {
        ref.set(state);
    }

    function debouncedSave() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(saveToFirebase, 300);
    }

    // Listen for real-time changes from any device
    ref.on('value', function(snapshot) {
        var data = snapshot.val();
        if (data) {
            state = data;
            // Ensure salespeople is an array with at least 9 slots
            if (!state.salespeople || !Array.isArray(state.salespeople)) {
                // Firebase may store arrays as objects with numeric keys
                if (state.salespeople && typeof state.salespeople === 'object') {
                    var arr = [];
                    var keys = Object.keys(state.salespeople);
                    keys.forEach(function(k) { arr[parseInt(k)] = state.salespeople[k]; });
                    state.salespeople = arr;
                } else {
                    state.salespeople = defaultState().salespeople;
                }
            }
            while (state.salespeople.length < 9) {
                state.salespeople.push({name:'', points:0});
            }
            // Fill any null/undefined slots
            for (var i = 0; i < state.salespeople.length; i++) {
                if (!state.salespeople[i]) state.salespeople[i] = {name:'', points:0};
            }
            if (!state.managers) state.managers = {points:0};
            if (!state.bdc) state.bdc = {points:0};
            if (!state.delivery) state.delivery = {points:0};
        }
        connected = true;
        updateSyncBadge();
        render();
    });

    // Connection state
    db.ref('.info/connected').on('value', function(snap) {
        connected = snap.val() === true;
        updateSyncBadge();
    });

    function updateSyncBadge() {
        var badge = document.getElementById('syncBadge');
        if (connected) {
            badge.className = 'sync-badge';
            badge.innerHTML = '<span>&#9679; Live &mdash; synced across all devices</span>';
        } else {
            badge.className = 'sync-badge offline';
            badge.innerHTML = '<span>&#9679; Offline &mdash; reconnecting...</span>';
        }
    }

    // --- Points & Names ---
    function getSalesTotal() {
        return state.salespeople.reduce(function(s,p){ return s + (p.points || 0); }, 0);
    }
    function getGroupTotal() {
        return getSalesTotal() + (state.managers.points||0) + (state.bdc.points||0) + (state.delivery.points||0);
    }

    function addPoints(target, inputId) {
        var inp = document.getElementById(inputId);
        var val = parseFloat(inp.value);
        if (isNaN(val)) return;
        if (typeof target === 'number') {
            state.salespeople[target].points = (state.salespeople[target].points || 0) + val;
        } else {
            state[target].points = (state[target].points || 0) + val;
        }
        inp.value = '';
        debouncedSave();
        render();
    }

    function updateName(idx, val) {
        state.salespeople[idx].name = val;
        debouncedSave();
    }

    function handleInputKey(e, target, inputId) {
        if (e.key === 'Enter') {
            addPoints(target, inputId);
        }
    }

    function resetAll() {
        if (!confirm('Reset ALL points and names to zero? This affects all devices.')) return;
        state = defaultState();
        saveToFirebase();
        render();
    }

    // --- Render ---
    function render() {
        var app = document.getElementById('app');

        // 3 teams for the podium
        var teams = [
            {key:'managers', name:'Sales Managers', pts: state.managers.points || 0},
            {key:'bdc', name:'BDC', pts: state.bdc.points || 0},
            {key:'delivery', name:'Delivery', pts: state.delivery.points || 0}
        ];

        var sorted = teams.slice().sort(function(a,b){ return b.pts - a.pts; });
        sorted.forEach(function(t, i) { t.rank = i + 1; });

        // Podium order: [2nd] [1st] [3rd]
        var podiumOrder = [2, 1, 3];
        var rankLabels = ['','1st','2nd','3rd'];

        var podiumCards = '';
        podiumOrder.forEach(function(targetRank, posIdx) {
            var t = sorted[targetRank - 1];
            var inputArea = '<div class="score-area">' +
                '<input id="' + t.key + 'Inp" placeholder="+/-" inputmode="numeric" onkeydown="handleInputKey(event,\'' + t.key + '\',\'' + t.key + 'Inp\')">' +
                '<button onclick="addPoints(\'' + t.key + '\',\'' + t.key + 'Inp\')">Add</button>' +
                '</div>';

            podiumCards += '<div class="podium-card rank-' + t.rank + '" style="order:' + (posIdx + 1) + '">' +
                '<div class="top">' +
                    '<div class="rank">' + rankLabels[t.rank] + '</div>' +
                    '<div class="team-name">' + t.name + '</div>' +
                '</div>' +
                '<div class="big-score">' + t.pts + '</div>' +
                inputArea +
                '</div>';
        });

        // Salespeople rows
        var salesRows = '';
        state.salespeople.forEach(function(p, i) {
            var displayName = (p.name || '').replace(/"/g, '&quot;');
            salesRows += '<div class="sp-row">' +
                '<span class="sp-num">' + (i+1) + '</span>' +
                '<input class="sp-name" value="' + displayName + '" placeholder="Team Member ' + (i+1) + '" onchange="updateName(' + i + ',this.value)">' +
                '<input class="mini-input" id="sp' + i + '" placeholder="+/-" inputmode="numeric" onkeydown="handleInputKey(event,' + i + ',\'sp' + i + '\')">' +
                '<button class="add-btn" onclick="addPoints(' + i + ',\'sp' + i + '\')">Add</button>' +
                '<span class="pts">' + (p.points || 0) + '</span>' +
                '</div>';
        });

        app.innerHTML =
            '<div class="podium-wrap">' + podiumCards + '</div>' +

            '<div class="sales-section">' +
                '<div class="section-bar">' +
                    '<span>Sales Team</span>' +
                    '<span class="score">' + getSalesTotal() + '</span>' +
                '</div>' +
                salesRows +
            '</div>' +

            '<div class="group-total">' +
                '<span class="label">Group Total</span>' +
                '<span class="value">' + getGroupTotal() + '</span>' +
            '</div>' +

            '<div class="reset-wrap">' +
                '<button class="reset-btn" onclick="resetAll()">Reset All Points</button>' +
            '</div>';

        // Pop animation
        document.querySelectorAll('.score, .big-score, .value').forEach(function(el) {
            el.classList.add('pop');
            el.addEventListener('animationend', function() { el.classList.remove('pop'); }, {once:true});
        });
    }

    render();
    </script>
</body>
</html>
