<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dealership &amp; Dragons - Leaderboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, 'system-ui', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f1f5f9;
            color: #1e293b;
            min-height: 100vh;
        }
        header {
            background: #1f2937;
            color: #fff;
            padding: 14px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        header h1 { font-size: 18px; font-weight: 700; }
        header p { font-size: 12px; color: #94a3b8; margin-top: 2px; }
        .back-link { color: #60a5fa; text-decoration: none; font-size: 13px; font-weight: 500; }
        .back-link:hover { color: #93c5fd; }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px 16px; }

        /* --- Podium --- */
        .podium-wrap {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 10px;
            margin-bottom: 20px;
            padding: 0 20px;
        }
        .podium-card {
            flex: 1;
            max-width: 200px;
            text-align: center;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .podium-card:hover { transform: translateY(-2px); }
        .podium-card .top {
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
        }
        .podium-card .top .rank { font-weight: 800; opacity: 0.9; line-height: 1; }
        .podium-card .top .team-name { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; }
        .podium-card .score-area {
            background: #fff;
            padding: 8px 10px;
            display: flex;
            align-items: center;
            gap: 5px;
            justify-content: center;
        }
        .podium-card .score-area input {
            width: 52px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            padding: 4px;
            font-size: 12px;
            text-align: center;
            font-family: inherit;
        }
        .podium-card .score-area input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px #3b82f633; }
        .podium-card .score-area button {
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 4px 9px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }
        .podium-card .score-area button:hover { background: #1d4ed8; }
        .podium-card .big-score { font-weight: 800; color: #1e293b; background: #fff; }

        /* Rank colors */
        .rank-1 .top { background: linear-gradient(135deg, #d97706, #f59e0b); }
        .rank-2 .top { background: linear-gradient(135deg, #475569, #64748b); }
        .rank-3 .top { background: linear-gradient(135deg, #9a3412, #ea580c); }
        .rank-4 .top { background: linear-gradient(135deg, #1e40af, #3b82f6); }

        /* Dynamic sizing per rank */
        .rank-1 .top { padding: 28px 10px 18px; }
        .rank-1 .top .rank { font-size: 30px; }
        .rank-1 .big-score { font-size: 34px; padding: 10px 0; }

        .rank-2 .top { padding: 20px 10px 14px; }
        .rank-2 .top .rank { font-size: 24px; }
        .rank-2 .big-score { font-size: 28px; padding: 8px 0; }

        .rank-3 .top { padding: 14px 10px 10px; }
        .rank-3 .top .rank { font-size: 20px; }
        .rank-3 .big-score { font-size: 24px; padding: 6px 0; }

        .rank-4 .top { padding: 10px 10px 8px; }
        .rank-4 .top .rank { font-size: 17px; }
        .rank-4 .big-score { font-size: 20px; padding: 5px 0; }

        /* --- Salespeople Section --- */
        .sales-section {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            margin-bottom: 14px;
            overflow: hidden;
        }
        .section-bar {
            background: #1e293b;
            color: #fff;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: 700;
        }
        .section-bar .score { font-size: 22px; font-weight: 800; color: #60a5fa; }
        .sales-grid { display: grid; grid-template-columns: 1fr 1fr; }
        .sp-row {
            display: flex;
            align-items: center;
            padding: 7px 14px;
            gap: 8px;
            border-bottom: 1px solid #f1f5f9;
        }
        .sp-row:nth-child(odd) { border-right: 1px solid #f1f5f9; }
        .sp-row:hover { background: #f8fafc; }
        .sp-name {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 13px;
            font-family: inherit;
            color: #334155;
            padding: 3px 4px;
            border-radius: 4px;
            min-width: 0;
        }
        .sp-name:focus { outline: none; background: #eff6ff; box-shadow: inset 0 0 0 1.5px #3b82f6; }
        .mini-input {
            width: 48px;
            border: 1px solid #d1d5db;
            border-radius: 5px;
            padding: 3px 4px;
            font-size: 12px;
            text-align: center;
            font-family: inherit;
            color: #334155;
        }
        .mini-input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px #3b82f633; }
        .add-btn {
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 5px;
            padding: 3px 10px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }
        .add-btn:hover { background: #1d4ed8; }
        .add-btn:active { transform: scale(0.96); }
        .pts {
            font-size: 14px;
            font-weight: 700;
            color: #1e293b;
            min-width: 24px;
            text-align: right;
        }
        .sts-row {
            display: flex;
            align-items: center;
            padding: 7px 14px;
            background: #eff6ff;
            border-top: 1px solid #dbeafe;
            gap: 8px;
        }
        .sts-label {
            flex: 1;
            font-size: 13px;
            color: #1d4ed8;
            font-weight: 600;
        }

        /* --- Group Total --- */
        .group-total {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            border-radius: 12px;
            padding: 16px 24px;
            margin-top: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 12px rgba(30,41,59,0.3);
        }
        .group-total .label {
            font-size: 16px;
            font-weight: 800;
            color: #fff;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
        .group-total .value {
            font-size: 36px;
            font-weight: 800;
            color: #60a5fa;
        }

        .reset-wrap { text-align: center; margin-top: 16px; }
        .reset-btn {
            background: transparent;
            color: #94a3b8;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            padding: 6px 20px;
            font-size: 12px;
            cursor: pointer;
            font-family: inherit;
        }
        .reset-btn:hover { background: #fef2f2; color: #dc2626; border-color: #fca5a5; }

        @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }
        .pop { animation: pop 0.25s ease; }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>Fred Anderson Toyota of Cape Coral</h1>
            <p>Dealership &amp; Dragons - Leaderboard</p>
        </div>
        <a href="index.html" class="back-link">&#8592; Back to Sim</a>
    </header>

    <div class="container" id="app"></div>

    <script>
    var STORAGE_KEY = 'dd_leaderboard_v5';

    function defaultState() {
        return {
            salespeople: Array.from({length:8}, function(_,i) { return {name:'Salesperson '+(i+1), points:0}; }),
            serviceToSales: {points:0},
            managers: {points:0},
            bdc: {points:0},
            delivery: {points:0}
        };
    }
    var state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || defaultState();
    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

    function getSalesTotal() {
        return state.salespeople.reduce(function(s,p){ return s+p.points; }, 0) + state.serviceToSales.points;
    }
    function getGroupTotal() {
        return getSalesTotal() + state.managers.points + state.bdc.points + state.delivery.points;
    }

    function addPoints(target, inputId) {
        var inp = document.getElementById(inputId);
        var val = parseFloat(inp.value);
        if (isNaN(val)) return;
        if (typeof target === 'number') {
            state.salespeople[target].points += val;
        } else {
            state[target].points += val;
        }
        inp.value = '';
        save(); render();
    }

    function updateName(idx, val) {
        state.salespeople[idx].name = val;
        save();
    }

    function resetAll() {
        if (!confirm('Reset all points to zero?')) return;
        state = defaultState();
        save(); render();
    }

    function render() {
        var app = document.getElementById('app');

        // 4 teams for the podium
        var teams = [
            {key:'managers', name:'Sales Managers', pts: state.managers.points},
            {key:'bdc', name:'BDC', pts: state.bdc.points},
            {key:'delivery', name:'Delivery', pts: state.delivery.points},
            {key:'salespeople_total', name:'Salespeople', pts: getSalesTotal()}
        ];

        // Sort by points descending to assign ranks
        var sorted = teams.slice().sort(function(a,b){ return b.pts - a.pts; });

        // Assign rank (1-4) to each team
        sorted.forEach(function(t, i) { t.rank = i + 1; });

        // Build a lookup by key
        var rankMap = {};
        sorted.forEach(function(t) { rankMap[t.key] = t; });

        // Podium order: [3rd] [1st] [2nd] [4th] for mountain shape
        var podiumOrder = [3, 1, 2, 4];

        // Build salespeople rows
        var salesRows = '';
        state.salespeople.forEach(function(p,i) {
            salesRows += '<div class="sp-row">' +
                '<input class="sp-name" value="' + p.name.replace(/"/g,'&quot;') + '" onchange="updateName(' + i + ',this.value)">' +
                '<input class="mini-input" id="sp' + i + '" placeholder="+/-">' +
                '<button class="add-btn" onclick="addPoints(' + i + ',\'sp' + i + '\')">Add</button>' +
                '<span class="pts" id="spd' + i + '">' + p.points + '</span>' +
                '</div>';
        });

        // Build podium cards in visual order
        var podiumCards = '';
        var rankLabels = ['','1st','2nd','3rd','4th'];

        podiumOrder.forEach(function(targetRank, posIdx) {
            var t = sorted[targetRank - 1];
            var isSalespeopleCard = (t.key === 'salespeople_total');

            // Input area - salespeople card has no input (points come from individual entries)
            var inputArea = '';
            if (!isSalespeopleCard) {
                inputArea = '<div class="score-area">' +
                    '<input id="' + t.key + 'Inp" placeholder="+/-">' +
                    '<button onclick="addPoints(\'' + t.key + '\',\'' + t.key + 'Inp\')">Add</button>' +
                    '</div>';
            } else {
                inputArea = '<div class="score-area" style="padding:4px 10px;font-size:10px;color:#94a3b8;">from individual entries</div>';
            }

            podiumCards += '<div class="podium-card rank-' + t.rank + '" style="order:' + (posIdx + 1) + '">' +
                '<div class="top">' +
                    '<div class="rank">' + rankLabels[t.rank] + '</div>' +
                    '<div class="team-name">' + t.name + '</div>' +
                '</div>' +
                '<div class="big-score" id="pod_' + t.key + '">' + t.pts + '</div>' +
                inputArea +
                '</div>';
        });

        app.innerHTML =
            '<div class="podium-wrap">' + podiumCards + '</div>' +

            '<div class="sales-section">' +
                '<div class="section-bar">' +
                    '<span>Partner Salespeople</span>' +
                    '<span class="score" id="salesTotal">' + getSalesTotal() + '</span>' +
                '</div>' +
                '<div class="sales-grid">' + salesRows + '</div>' +
                '<div class="sts-row">' +
                    '<span class="sts-label">Service to Sales</span>' +
                    '<input class="mini-input" id="stsInp" placeholder="+/-">' +
                    '<button class="add-btn" onclick="addPoints(\'serviceToSales\',\'stsInp\')">Add</button>' +
                    '<span class="pts" id="stsDisp">' + state.serviceToSales.points + '</span>' +
                '</div>' +
            '</div>' +

            '<div class="group-total">' +
                '<span class="label">Group Total</span>' +
                '<span class="value" id="groupTotal">' + getGroupTotal() + '</span>' +
            '</div>' +

            '<div class="reset-wrap">' +
                '<button class="reset-btn" onclick="resetAll()">Reset All Points</button>' +
            '</div>';

        document.querySelectorAll('.score, .big-score, .value').forEach(function(el) {
            el.classList.add('pop');
            el.addEventListener('animationend', function() { el.classList.remove('pop'); }, {once:true});
        });
    }

    render();
    </script>
</body>
</html>
